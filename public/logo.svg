<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#8b5cf6"/>
  <!-- Inner gradient overlay -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#g)"/>
  <!-- Checkmark -->
  <polyline points="18,33 27,42 46,22" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Subtle track dots -->
  <circle cx="14" cy="12" r="3" fill="white" opacity="0.4"/>
  <circle cx="50" cy="12" r="3" fill="white" opacity="0.4"/>
  <circle cx="14" cy="52" r="3" fill="white" opacity="0.4"/>
</svg>
